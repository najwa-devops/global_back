spring.application.name=invoice-reader

# Active profile defaults to local (MariaDB on localhost:3306)
spring.profiles.default=local

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# FILE UPLOAD CONFIGURATION
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

invoice.upload.dir=${UPLOAD_DIR:C:\\evoleos\\uploads}
banking.upload.dir=${UPLOAD_BANK_DIR:C:\\evoleos\\uploads_banking}
banking.duplicate-detection-enabled=false
banking.allow-multiple-statements-per-period=true
banking.validation.tolerance=0.01

tesseract.path=${TESSERACT_PATH:C:\\Program Files\\Tesseract-OCR\\tesseract.exe}
tesseract.datapath=${TESSERACT_DATAPATH:C:\\Program Files\\Tesseract-OCR\\tessdata}
tesseract.language=${TESSERACT_LANGUAGE:fra+eng}
ocr.engine=${OCR_ENGINE:paddle}
ocr.paddle.model=${OCR_PADDLE_MODEL:ONNX_PPOCR_V4}
ocr.paddle.num-threads=${OCR_PADDLE_NUM_THREADS:2}

# SERVER CONFIGURATION
server.port=${BACKEND_PORT:8089}

# LOGGING
logging.level.root=WARN
logging.level.com.invoice_reader=DEBUG
logging.level.org.springframework.context=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=DEBUG

# ACTUATOR
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true

# CORS CONFIGURATION
# Ajoute l'URL du frontend pour l'accès local ou via adresse IP sur le réseau.
# En dev, tu peux mettre CORS_ORIGINS=* pour autoriser toutes les origines.
cors.allowed.origins=${CORS_ORIGINS:*}

# REGEX ENRICHMENT (safe by default)
regex.enrichment.enabled=${REGEX_ENRICHMENT_ENABLED:false}
regex.enrichment.min-samples=${REGEX_ENRICHMENT_MIN_SAMPLES:3}
regex.enrichment.min-confidence=${REGEX_ENRICHMENT_MIN_CONFIDENCE:0.75}
regex.enrichment.max-history-samples=${REGEX_ENRICHMENT_MAX_HISTORY_SAMPLES:20}

# OLMOCR FALLBACK
olmocr.enabled=${OLMOCR_ENABLED:false}
olmocr.mode=${OLMOCR_MODE:docker}
olmocr.workspace-dir=${OLMOCR_WORKSPACE_DIR:C:\\evoleos\\olmocr-workspace}
olmocr.docker-image=${OLMOCR_DOCKER_IMAGE:alleninstituteforai/olmocr:latest-with-model}
olmocr.docker-gpu=${OLMOCR_DOCKER_GPU:false}
olmocr.command=${OLMOCR_COMMAND:olmocr}
olmocr.server=${OLMOCR_SERVER:}
olmocr.model=${OLMOCR_MODEL:allenai/olmOCR-2-7B-1025-FP8}
olmocr.api-key=${OLMOCR_API_KEY:}
olmocr.timeout-seconds=${OLMOCR_TIMEOUT_SECONDS:600}
olmocr.strategy=${OLMOCR_STRATEGY:fallback}
olmocr.primary-min-length=${OLMOCR_PRIMARY_MIN_LENGTH:120}

