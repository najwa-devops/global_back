# DATABASE CONFIGURATION (Docker network)
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://mariadb:3306/invoice_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# OCR defaults for Linux container
tesseract.path=${TESSERACT_PATH:/usr/bin/tesseract}
tesseract.datapath=${TESSERACT_DATAPATH:/usr/share/tesseract-ocr/5/tessdata}
tesseract.language=${TESSERACT_LANGUAGE:eng+fra}
