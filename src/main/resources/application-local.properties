# DATABASE CONFIGURATION (Local)
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://localhost:3306/invoice_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# OCR defaults for local Windows workstation
tesseract.path=${TESSERACT_PATH:C:\\Program Files\\Tesseract-OCR\\tesseract.exe}
tesseract.datapath=${TESSERACT_DATAPATH:C:\\Program Files\\Tesseract-OCR\\tessdata}
tesseract.language=${TESSERACT_LANGUAGE:fra+eng}
