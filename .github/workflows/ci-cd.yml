name: CI/CD Backend

on:
  push:
    branches: [main, najwa]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Couverture
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: invoice_db_test
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test --no-transfer-progress
        env:
          DATABASE_URL: jdbc:mariadb://localhost:3306/invoice_db_test?createDatabaseIfNotExist=true
          DATABASE_USERNAME: root
          DATABASE_PASSWORD: root
          SPRING_PROFILES_ACTIVE: docker

      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report --no-transfer-progress

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

  build:
    name: Build JAR + Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress

      - name: Build Docker image
        run: docker build -t invoice-backend:${{ github.sha }} .

      - name: Verify image
        run: docker images invoice-backend
